name: Beta Pipeline (Test + Build + Release)

on:
  push:
    branches: [main, develop, beta2]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 1. Unit tests ──
  jest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:ci -- --passWithNoTests

  # ── 2. Build release APK on EAS Cloud (only on version tags) ──
  build-release:
    needs: jest-tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build on EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json \
            --output=./build-result.json
      - name: Find APK URL
        id: find-url
        run: |
          URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./build-result.json','utf8')).artifacts.buildUrl)")
          echo "apk_url=$URL" >> $GITHUB_OUTPUT
      - name: Download APK
        run: |
          curl -L -o app-release.apk "${{ steps.find-url.outputs.apk_url }}"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./app-release.apk

  # ── 3. GitHub Release ──
  github-release:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./
      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          files: ./app-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated beta build of CSHAD iSentinel News."
          draft: false
          prerelease: true