name: Beta Pipeline (Test + Build + Release)

on:
  push:
    branches: [main, develop, beta2]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 1. Unit tests ──
  jest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:ci -- --passWithNoTests

  # ── 2. Trigger EAS cloud build + download APK (only on version tags) ──
  build-release:
    needs: jest-tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Start EAS build
        id: start
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID=$(npx eas-cli build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --wait | tee /dev/stderr | jq -r '.id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Wait for build and download APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.start.outputs.build_id }}
        run: |
          # Poll until the build is finished
          while true; do
            STATUS=$(curl -s -H "Authorization: Bearer $EXPO_TOKEN" \
              "https://expo.dev/api/v2/projects/41d9d284-b014-48ab-9238-fe2c0724fd98/builds/$BUILD_ID" \
              | jq -r '.status')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "finished" ]; then
              break
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Build failed with status $STATUS"
              exit 1
            fi
            sleep 15
          done

          # Get the artifact URL
          APK_URL=$(curl -s -H "Authorization: Bearer $EXPO_TOKEN" \
            "https://expo.dev/api/v2/projects/41d9d284-b014-48ab-9238-fe2c0724fd98/builds/$BUILD_ID" \
            | jq -r '.artifacts.buildUrl')
          echo "Downloading APK from $APK_URL"
          curl -L -o app-release.apk "$APK_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./app-release.apk

  # ── 3. GitHub Release ──
  github-release:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./
      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          files: ./app-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated beta build of CSHAD iSentinel News."
          draft: false
          prerelease: true