name: Beta Pipeline (Test + Build + Release)

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 1. Unit & integration tests ──
  jest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:ci -- --passWithNoTests

  # ── 2. UI smoke tests with Maestro ──
  maestro-tests:
    needs: jest-tests
    runs-on: ubuntu-latest
    container:
      image: reactivecircus/android-emulator-29:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build debug APK locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas build --platform android --profile debug --local --non-interactive
      - name: Install APK on emulator
        run: |
          adb wait-for-device
          adb install android/app/build/outputs/apk/debug/app-debug.apk
      - name: Run Maestro tests
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test maestro/

  # ── 3. Build release APK (tag pushes only) ──
  build-release:
    needs: [jest-tests, maestro-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas build --platform android --profile preview --non-interactive
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./output
      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: output/app-release.apk
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated beta build of CSHAD iSentinel News."
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}